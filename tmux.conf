# .tmux.conf
# => tmux Settings
# Last updated on 2026. 02. 25.

# ==================================================
# => General
# ==================================================

# Scrollback buffer size
set-option -g history-limit 10000

# Enable UTF-8 support for status bar (deprecated since tmux 2.2)
# set-option -q -g status-utf8 on

# Enable UTF-8 support for window (deprecated since tmux 2.2)
# set-window-option -q -g utf8 on

# Reduce delay after pressing Escape key (ms)
set-option -s escape-time 10

# Enable focus events for terminal applications
set-option -s focus-events on

# Time to wait for repeated key bindings (ms)
set-option -sg repeat-time 600

# Enable xterm-style key sequences
set-window-option -g xterm-keys on

# Enable system clipboard integration
set-option -g set-clipboard on

# ==================================================
# => UI
# ==================================================

# Set default terminal type with true color support
set-option -g default-terminal "tmux-256color"

# Enable true color (24-bit) for 256color terminals
set-option -ga terminal-overrides ",*256col*:Tc"
set-option -ga terminal-overrides ",xterm-ghostty:Tc"

# Start window numbering from 1
set-option -g base-index 1

# Start pane numbering from 1
set-window-option -g pane-base-index 1

# Duration to display pane numbers (ms)
set-option -g display-panes-time 800

# Duration to display status messages (ms)
set-option -g display-time 1000

# Refresh status bar every 10 seconds
set-option -g status-interval 10

# Automatically renumber windows when one is closed
set-option -g renumber-windows on

# Set terminal title to current window name
set-option -g set-titles on

# Automatically rename window based on running command
set-window-option -g automatic-rename on

# Monitor window activity
set-option -g monitor-activity on

# Disable visual notification for activity
set-option -g visual-activity off

# Enable mouse support
set-option -g mouse on

# ==================================================
# => Keybindings
# ==================================================

# Change prefix key from C-b to C-a
unbind-key "C-b"
set -g prefix "C-a"
bind-key "C-a" send-prefix

# Reload configuration file with prefix + r
bind-key r source-file ~/.tmux.conf

# Use vi-style key bindings in copy mode
set-window-option -g mode-keys vi

# Cancel copy mode with Escape
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Begin selection with v in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Yank selection with y and copy to system clipboard (macOS)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Yank selection with y and copy to system clipboard (Linux, requires xclip)
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# Split window vertically with - (use current path)
bind-key - split-window -v -c "#{pane_current_path}"

# Split window horizontally with \ (use current path)
bind-key \\ split-window -h -c "#{pane_current_path}"

# Create new window with current path
# bind-key c new-window -c "#{pane_current_path}"

# Navigate panes with vim-style keys
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

# Resize panes with vim-style keys (2 cells at a time)
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2

# ==================================================
# => Statusline
# ==================================================

# Style for status bar messages
set-option -g message-style "none"

# Style for command prompt messages
set-option -g message-command-style "none"

# Enable status bar
set-option -g status "on"

# Align window list to the left
set-option -g status-justify "left"

# Default status bar style
set-option -g status-style "none"

# Maximum length of left status bar
set-option -g status-left-length "100"
set-option -g status-left-style "none"

# Display session name on the left
set-option -g status-left " #[fg=yellow,bold]#S#[fg=default,nobold] | "

# Maximum length of right status bar
set-option -g status-right-length "100"
set-option -g status-right-style "none"

# Display date, time, and hostname on the right
set-option -g status-right " | #[bold]%Y-%m-%d %H:%M#[nobold] | #[fg=green,bold]#h#[#fg=default,nobold] "

# Default window status style
set-window-option -g window-status-style "none"

# Style for windows with activity
set-window-option -g window-status-activity-style "none"

# Format for inactive windows
set-window-option -g window-status-format "#I:#W"

# Format for active window (highlighted in cyan)
set-window-option -g window-status-current-format "#[fg=cyan,bold]#I:#W#F#[fg=default,nobold]"

# Separator between window names
set-window-option -g window-status-separator " "

# Style for pane borders
set-option -g pane-border-style "fg=default,bold"

# Style for active pane border (highlighted in cyan)
set-option -g pane-active-border-style "fg=cyan,bold"
